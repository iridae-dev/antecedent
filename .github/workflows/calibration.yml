# DESIGN.md §28.3 statistical calibration (scheduled; not every-PR unit CI).
name: calibration

on:
  schedule:
    # Weekly Monday 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  gate:
    name: Statistical calibration gate
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run calibration gate
        run: bash scripts/gate_calibration.sh
