# CodeQL security + quality scanning (Rust, Python, Actions).
name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Sunday 07:00 UTC
    - cron: "0 7 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Fork PRs cannot upload SARIF (read-only token); skip noisily failing uploads.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [rust, python, actions]
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          category: "/language:${{ matrix.language }}"
          upload: always

      - name: Require zero findings
        env:
          SARIF_DIR: ${{ steps.analyze.outputs.sarif-output }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys
          from pathlib import Path
          root = Path(os.environ["SARIF_DIR"])
          files = sorted(root.rglob("*.sarif")) if root.exists() else []
          if not files:
              print(f"FAIL: no SARIF under {root}", file=sys.stderr)
              sys.exit(1)
          total = 0
          for path in files:
              data = json.loads(path.read_text())
              n = sum(len(run.get("results", [])) for run in data.get("runs", []))
              print(f"{path.name}: {n} finding(s)")
              total += n
              for run in data.get("runs", []):
                  for r in run.get("results", []):
                      locs = r.get("locations") or []
                      loc = ""
                      if locs:
                          pl = locs[0].get("physicalLocation", {})
                          uri = pl.get("artifactLocation", {}).get("uri", "")
                          line = pl.get("region", {}).get("startLine")
                          loc = f"{uri}:{line}"
                      msg = (r.get("message") or {}).get("text", "").split("\n", 1)[0]
                      print(f"  - {r.get('ruleId')}: {loc} — {msg}")
          if total:
              print(f"FAIL: {total} CodeQL finding(s)", file=sys.stderr)
              sys.exit(1)
          print("PASS: 0 CodeQL findings")
          PY
