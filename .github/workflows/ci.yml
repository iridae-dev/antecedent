name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85
        with:
          toolchain: "1.85"
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: crates.io publish dry-run
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -qE '^crates/.+/Cargo\.toml$|^Cargo\.toml$|^scripts/publish_crates\.sh$'; then
            bash scripts/publish_crates.sh --dry-run
          else
            echo "No crate manifest changes; skipping publish dry-run"
          fi

      - name: Install cargo-deny
        # Pin to a release that still builds on MSRV 1.85 (newer deny needs 1.88+).
        run: cargo install cargo-deny --locked --version 0.18.3

      - name: Release gate
        # Feature gates also smoke Python facades via uv; those live in
        # python-wheels. Rust runners do not install the Python toolchain.
        env:
          SKIP_PYTHON_SMOKE: "1"
        run: bash scripts/gate_release.sh

      - name: DCO check
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --deepen=50 origin "${{ github.base_ref }}" || true
          RANGE="origin/${{ github.base_ref }}...HEAD"
          while IFS= read -r commit; do
            if ! git log -1 --format=%B "$commit" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "Missing DCO on $commit"
              git log -1 --format=%B "$commit"
              exit 1
            fi
          done < <(git rev-list "$RANGE")

  # : CPython 3.11–3.14; Linux x86_64/aarch64 manylinux;
  # macOS arm64; Windows x86_64. Default faer path (no system BLAS).
  python-wheels:
    name: Wheel ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            python: "3.12"
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            python: "3.13"
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            python: "3.14"
            target: x86_64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.11"
            target: aarch64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.12"
            target: aarch64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.13"
            target: aarch64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.14"
            target: aarch64
            manylinux: auto
          - os: macos-14
            python: "3.11"
            target: aarch64
            manylinux: ""
          - os: macos-14
            python: "3.12"
            target: aarch64
            manylinux: ""
          - os: macos-14
            python: "3.13"
            target: aarch64
            manylinux: ""
          - os: macos-14
            python: "3.14"
            target: aarch64
            manylinux: ""
          - os: windows-latest
            python: "3.11"
            target: x64
            manylinux: ""
          - os: windows-latest
            python: "3.12"
            target: x64
            manylinux: ""
          - os: windows-latest
            python: "3.13"
            target: x64
            manylinux: ""
          - os: windows-latest
            python: "3.14"
            target: x64
            manylinux: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@b0480e2d44a72e89a62650e223ba831cbca8d2be # 1.85
        with:
          toolchain: "1.85"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: python
          command: build
          # manylinux images have no bare `python` on PATH; pass the version
          # so maturin resolves /opt/python/cp3XY-*/bin/python inside the container.
          args: --release --out dist -i ${{ matrix.python }}
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          sccache: "true"

      - name: Install wheel and smoke tests
        shell: bash
        run: |
          set -euo pipefail
          # Install from repo root, then import/test outside python/ so the
          # source tree does not shadow the wheel on sys.path.
          pip install python/dist/*.whl numpy pytest
          cd "$(mktemp -d)"
          python -c "import antecedent; print(antecedent.__version__)"
          # Point pytest at the repo tests while keeping cwd off python/
          ROOT="${{ github.workspace }}"
          pytest -q \
            "$ROOT/python/tests/test_arrow_copy_gate.py" \
            "$ROOT/python/tests/test_graph_interchange.py" \
            "$ROOT/python/tests/test_analyze_ate_estimate.py" \
            "$ROOT/python/tests/test_discover_pcmci.py" \
            "$ROOT/python/tests/test_discover_pcmci_plus.py" \
            "$ROOT/python/tests/test_gcm_rich_returns.py" \
            "$ROOT/python/tests/test_panel_bayesian.py" \
            "$ROOT/python/tests/test_temporal_bayesian_pulse.py" \
            "$ROOT/python/tests/test_prior_bank.py" \
            "$ROOT/python/tests/test_eventframe_discovery.py" \
            "$ROOT/python/tests/test_panel_pooled_discovery.py"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}-${{ matrix.target }}
          path: python/dist/*.whl
          if-no-files-found: error
          retention-days: 14
