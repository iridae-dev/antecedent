name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Release gate
        run: bash scripts/gate_release.sh

      - name: DCO check
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --deepen=50 origin "${{ github.base_ref }}" || true
          RANGE="origin/${{ github.base_ref }}...HEAD"
          while IFS= read -r commit; do
            if ! git log -1 --format=%B "$commit" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "Missing DCO on $commit"
              git log -1 --format=%B "$commit"
              exit 1
            fi
          done < <(git rev-list "$RANGE")

  # DESIGN.md §25.5: CPython 3.11–3.14; Linux x86_64/aarch64 manylinux;
  # macOS x86_64/arm64; Windows x86_64. Default faer path (no system BLAS).
  python-wheels:
    name: Wheel ${{ matrix.os }} py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.11"
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            python: "3.12"
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            python: "3.13"
            target: x86_64
            manylinux: auto
          - os: ubuntu-latest
            python: "3.14"
            target: x86_64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.11"
            target: aarch64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.12"
            target: aarch64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.13"
            target: aarch64
            manylinux: auto
          - os: ubuntu-24.04-arm
            python: "3.14"
            target: aarch64
            manylinux: auto
          - os: macos-13
            python: "3.11"
            target: x86_64
            manylinux: ""
          - os: macos-13
            python: "3.12"
            target: x86_64
            manylinux: ""
          - os: macos-13
            python: "3.13"
            target: x86_64
            manylinux: ""
          - os: macos-13
            python: "3.14"
            target: x86_64
            manylinux: ""
          - os: macos-14
            python: "3.11"
            target: aarch64
            manylinux: ""
          - os: macos-14
            python: "3.12"
            target: aarch64
            manylinux: ""
          - os: macos-14
            python: "3.13"
            target: aarch64
            manylinux: ""
          - os: macos-14
            python: "3.14"
            target: aarch64
            manylinux: ""
          - os: windows-latest
            python: "3.11"
            target: x64
            manylinux: ""
          - os: windows-latest
            python: "3.12"
            target: x64
            manylinux: ""
          - os: windows-latest
            python: "3.13"
            target: x64
            manylinux: ""
          - os: windows-latest
            python: "3.14"
            target: x64
            manylinux: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: python
          command: build
          args: --release --out dist -i python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          sccache: "true"

      - name: Install wheel and smoke tests
        shell: bash
        working-directory: python
        run: |
          pip install dist/*.whl numpy pytest
          python -c "import causal; print(causal.__version__)"
          pytest -q tests/test_arrow_copy_gate.py tests/test_graph_interchange.py
