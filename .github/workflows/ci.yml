name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --exclude causal -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude causal

      - name: Phase 4 reuse gate
        run: bash scripts/gate_phase4_reuse.sh

      - name: DCO check
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          git fetch --deepen=50 origin "${{ github.base_ref }}" || true
          RANGE="origin/${{ github.base_ref }}...HEAD"
          while IFS= read -r commit; do
            if ! git log -1 --format=%B "$commit" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "Missing DCO on $commit"
              git log -1 --format=%B "$commit"
              exit 1
            fi
          done < <(git rev-list "$RANGE")

  # Phase 0 wheel-build skeleton (maturin). Full matrix lands in Phase 12.
  python-wheel:
    name: Python wheel skeleton
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: python -> ../target

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel (abi3 / manylinux not required yet)
        working-directory: python
        run: maturin build --release --out dist

      - name: Install wheel and smoke-import
        working-directory: python
        run: |
          pip install dist/*.whl numpy pytest
          python -c "import causal; print(causal.__version__)"
          pytest -q tests/test_arrow_copy_gate.py
