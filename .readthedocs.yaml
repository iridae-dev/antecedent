# Read the Docs — MkDocs narrative + pdoc Python API under /python/.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    post_build:
      # Run away from the checkout so `python/antecedent` cannot shadow the
      # installed wheel (missing _native → ImportError).
      - mkdir -p "${READTHEDOCS_OUTPUT}/html/python"
      - >
        bash -lc 'cd "$(mktemp -d)"
        && python -c "import antecedent; print(antecedent.__file__, getattr(antecedent, \"__version__\", \"?\"))"
        && python -m pdoc antecedent -o "${READTHEDOCS_OUTPUT}/html/python"'

mkdocs:
  configuration: mkdocs.yml
  fail_on_warning: false

python:
  install:
    - requirements: requirements-docs.txt
